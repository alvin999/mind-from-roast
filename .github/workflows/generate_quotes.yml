name: Generate Daily Quotes

on:
  schedule:
    - cron: '0 16 * * *' # 每天 UTC 16:00 (台北時間 00:00)
  workflow_dispatch: # 允許手動執行

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate quotes
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_quotes.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add daily_quotes.json
          git commit -m "Update daily quotes [skip ci]" || echo "No changes to commit"
          git push
