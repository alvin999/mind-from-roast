<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind From Roast | 脈環漏 - 療癒番茄鐘</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="js/translations.js"></script>
</head>
<body>
    <!-- 影片背景 -->
    <div class="video-background">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="assets/video/bg_pingpong.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
    </div>

    <!-- 番茄鐘主體 -->
    <main class="container">
        <div class="glass-panel">
                <header>
                <h1 id="status-text" data-i18n="focus_time">Focus Time</h1>
                <p id="quote" data-i18n="take_breath">Take a deep breath.</p>
                <div class="header-controls">
                    <div class="lang-menu">
                        <button id="lang-toggle" class="icon-toggle-btn" title="Change Language">
                            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                        </button>
                        <div id="lang-options" class="options-panel hidden">
                            <button class="lang-option" data-lang="zh">繁體中文</button>
                            <button class="lang-option" data-lang="en">English</button>
                            <button class="lang-option" data-lang="ja">日本語</button>
                        </div>
                    </div>

                    <div class="notification-menu">
                        <button id="noti-toggle" class="icon-toggle-btn" title="Enable Notifications" data-i18n-title="notify_toggle">
                            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                        </button>
                    </div>

                    <div class="theme-menu">
                        <button id="theme-toggle" class="theme-toggle-btn">
                            <span class="current-theme-dot"></span><span class="toggle-label" data-i18n="theme">Theme</span>
                        </button>
                        <div id="theme-options" class="theme-options hidden">
                            <button class="theme-dot" data-theme="red" style="background: #ff8a8a;" title="Rose"></button>
                            <button class="theme-dot" data-theme="blue" style="background: #8ab6ff;" title="Ocean"></button>
                            <button class="theme-dot" data-theme="green" style="background: #8affad;" title="Forest"></button>
                            <button class="theme-dot" data-theme="yellow" style="background: #fffa8a;" title="Sunshine"></button>
                            <button class="theme-dot" data-theme="purple" style="background: #d18aff;" title="Lavender"></button>
                            <button class="theme-dot" data-theme="orange" style="background: #ffb38a;" title="Sunset"></button>
                            <button class="theme-dot" data-theme="teal" style="background: #8afff2;" title="Mint"></button>
                            <button class="theme-dot" data-theme="gray" style="background: #d1d1d1;" title="Mist"></button>
                            
                            <div class="theme-divider"></div>
                            
                            <button class="theme-dot" data-theme="midnight" style="background: #1e3a5f;" title="Midnight"></button>
                            <button class="theme-dot" data-theme="espresso" style="background: #3e2723;" title="Espresso"></button>
                            <button class="theme-dot" data-theme="evergreen" style="background: #1b5e20;" title="Evergreen"></button>
                            <button class="theme-dot" data-theme="bordeaux" style="background: #880e4f;" title="Bordeaux"></button>
                            <button class="theme-dot" data-theme="amethyst" style="background: #4a148c;" title="Amethyst"></button>
                            <button class="theme-dot" data-theme="coal" style="background: #212121;" title="Coal"></button>
                            <button class="theme-dot" data-theme="space" style="background: #0d1b2a;" title="Space"></button>
                            <button class="theme-dot" data-theme="graphite" style="background: #424242;" title="Graphite"></button>
                        </div>
                    </div>
                </div>
            </header>

            <div class="timer-container">
                <svg class="progress-ring" width="300" height="300">
                    <circle class="progress-ring__circle-bg" stroke="rgba(255,255,255,0.1)" stroke-width="8" fill="transparent" r="140" cx="150" cy="150"/>
                    <circle id="progress-indicator" class="progress-ring__circle" stroke="var(--accent-color)" stroke-width="8" stroke-linecap="round" fill="transparent" r="140" cx="150" cy="150"/>
                </svg>
                <div class="timer-display">
                    <span id="minutes">25</span>:<span id="seconds">00</span>
                </div>
            </div>

            <div class="duration-selector">
                <button class="duration-btn" data-time="25">25</button>
                <button class="duration-btn" data-time="45">45</button>
                <button class="duration-btn" data-time="60">60</button>
                <button id="custom-time-btn" class="duration-btn" data-i18n="custom">Custom</button>
            </div>

            <div class="controls">
                <button id="start-btn" class="btn primary" data-i18n="start_focus">Start Focus</button>
                <button id="pause-btn" class="btn secondary" data-i18n="pause" disabled>Pause</button>
                <button id="reset-btn" class="btn tertiary" data-i18n="reset">Reset</button>
            </div>

            <div class="modes">
                <button id="work-mode" class="mode-btn active" data-i18n="focus_time">Focus</button>
                <button id="short-break-mode" class="mode-btn" data-i18n="short_break">Short Break</button>
                <button id="long-break-mode" class="mode-btn" data-i18n="long_break">Long Break</button>
            </div>
        </div>

        <!-- 今日紀錄面板 -->
        <div class="records-panel glass-panel">
            <h3 data-i18n="today_flow">Today's Flow</h3>
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-value" id="stat-pomos">0</span>
                    <span class="stat-label" data-i18n="pomodoros">Pomodoros</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="stat-minutes">0</span>
                    <span class="stat-label" data-i18n="minutes">Minutes</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="stat-wisdom">0</span>
                    <span class="stat-label" data-i18n="wisdom">Wisdom</span>
                </div>
            </div>
            <div id="log-container" class="log-list">
                <!-- Log entries will be added here -->
            </div>
        </div>

        <!-- 環境音獨立面板 -->
        <div class="ambient-panel glass-panel">
            <div class="panel-header-row">
                <h3 data-i18n="ambient_title">Ambient</h3>
                <button id="ambient-reset" class="icon-btn-mini" title="Reset All Volumes" data-i18n-title="reset_ambient">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline></svg>
                </button>
            </div>

            <!-- 背景主題切換 -->
            <div class="theme-section">
                <p class="section-label" data-i18n="theme_title">Theme</p>
                <div class="theme-switcher">
                    <button class="theme-btn active" data-theme="zen" title="Zen Silence" data-i18n-title="theme_zen">
                        <div class="theme-preview zen-bg"></div>
                    </button>
                    <button class="theme-btn" data-theme="cafe" title="Afternoon Cafe" data-i18n-title="theme_cafe">
                        <div class="theme-preview cafe-bg"></div>
                    </button>
                </div>
            </div>

            <div class="ambient-grid">
                <!-- White Noise -->
                <div class="ambient-control">
                    <button class="ambient-btn" data-type="white" title="White Noise" data-i18n-title="white_noise">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect><polyline points="17 2 17 7"></polyline><polyline points="7 2 7 7"></polyline><polyline points="2 13 22 13"></polyline></svg>
                    </button>
                    <input type="range" class="ambient-slider-mini" min="0" max="1" step="0.01" value="0.5" data-type="white">
                </div>
                <!-- Pink Noise -->
                <div class="ambient-control">
                    <button class="ambient-btn" data-type="pink" title="Pink Noise" data-i18n-title="pink_noise">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"></path><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"></path></svg>
                    </button>
                    <input type="range" class="ambient-slider-mini" min="0" max="1" step="0.01" value="0.5" data-type="pink">
                </div>
                <!-- Brown Noise -->
                <div class="ambient-control">
                    <button class="ambient-btn" data-type="brown" title="Brown Noise" data-i18n-title="brown_noise">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"></path><path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"></path><path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"></path></svg>
                    </button>
                    <input type="range" class="ambient-slider-mini" min="0" max="1" step="0.01" value="0.5" data-type="brown">
                </div>
                <!-- Cafe -->
                <div class="ambient-control">
                    <button class="ambient-btn" data-type="cafe" title="Cafe" data-i18n-title="cafe_ambient">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M17 8h1a4 4 0 1 1 0 8h-1"></path><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"></path><line x1="6" y1="2" x2="6" y2="4"></line><line x1="10" y1="2" x2="10" y2="4"></line><line x1="14" y1="2" x2="14" y2="4"></line></svg>
                    </button>
                    <input type="range" class="ambient-slider-mini" min="0" max="1" step="0.01" value="0.5" data-type="cafe">
                </div>
                <!-- Rain -->
                <div class="ambient-control">
                    <button class="ambient-btn" data-type="rain" title="Rain" data-i18n-title="rain_ambient">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14.89c0-4 3.12-7.3 7-7.82a7.44 7.44 0 0 1 1.48-.14 7 7 0 0 1 1.44 13.85"></path><path d="M16 13a5 5 0 1 1-4.9 6H5a3 3 0 0 1 0-6Z"></path><line x1="16" y1="13" x2="14" y2="21"></line><line x1="8" y1="13" x2="6" y2="21"></line><line x1="12" y1="15" x2="10" y2="23"></line></svg>
                    </button>
                    <input type="range" class="ambient-slider-mini" min="0" max="1" step="0.01" value="0.5" data-type="rain">
                </div>
            </div>
        </div>
    </main>

    <!-- 智慧問答彈窗 -->
    <div id="wisdom-modal" class="modal-overlay hidden">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h2 data-i18n="wisdom_moment">Wisdom Moment</h2>
                <p data-i18n="wisdom_desc">專注時段結束了，給心靈一點空間...</p>
            </div>
            <div class="modal-body">
                <p class="question" data-i18n="wisdom_question">這件事，目前能解決嗎？</p>
                <div class="wisdom-actions">
                    <button id="solve-yes" class="btn primary" data-i18n="solve_yes">能解決</button>
                    <button id="solve-no" class="btn primary" data-i18n="solve_no">暫時不能</button>
                </div>
            </div>
            <div id="wisdom-result" class="modal-footer hidden">
                <p id="wisdom-message"></p>
                <button id="close-modal" class="btn secondary" data-i18n="close_wisdom">好的，放下吧</button>
            </div>
        </div>
    </div>

    <!-- 自訂時間彈窗 -->
    <div id="custom-time-modal" class="modal-overlay hidden">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h2 data-i18n="set_duration">Set Focus Duration</h2>
                <p data-i18n="duration_range">設定您的專注長度 (1-120 分鐘)</p>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <button id="decrease-time" class="num-ctrl-btn" title="Decrease">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                    <input type="number" id="custom-minutes-input" min="1" max="120" value="25">
                    <button id="increase-time" class="num-ctrl-btn" title="Increase">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                    <span data-i18n="min_unit">min</span>
                </div>
                <div class="modal-actions">
                    <button id="save-custom-time" class="btn primary" data-i18n="confirm">確認設定</button>
                    <button id="cancel-custom-time" class="btn secondary" data-i18n="cancel">取消</button>
                </div>
            </div>
        </div>
    </div>

    </div>

    <!-- 音效庫 (靜音載入) - 使用本地風鈴音效 -->
    <audio id="bell-sound" src="assets/audio/wind-chime.mp3" preload="auto"></audio>

    <script src="js/audio_manager.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
